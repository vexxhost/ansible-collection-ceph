- nodeset:
    name: ansible-collection-ceph-aio-ubuntu-jammy
    nodes:
      - name: aio
        label: ubuntu-jammy
    groups:
      - name: controllers
        nodes:
          - aio
      - name: cephs
        nodes:
          - aio

- nodeset:
    name: ansible-collection-ceph-aio-ubuntu-noble
    nodes:
      - name: aio
        label: ubuntu-noble
    groups:
      - name: controllers
        nodes:
          - aio
      - name: cephs
        nodes:
          - aio

- nodeset:
    name: ansible-collection-ceph-ha-ubuntu-jammy
    nodes:
      - name: mon1
        label: ubuntu-jammy
      - name: osd1
        label: ubuntu-jammy
    groups:
      - name: controllers
        nodes:
          - mon1
      - name: cephs
        nodes:
          - osd1

- nodeset:
    name: ansible-collection-ceph-ha-ubuntu-noble
    nodes:
      - name: mon1
        label: ubuntu-noble
      - name: osd1
        label: ubuntu-noble
    groups:
      - name: controllers
        nodes:
          - mon1
      - name: cephs
        nodes:
          - osd1

- job:
    name: ansible-collection-ceph-molecule
    parent: molecule
    abstract: true
    vars:
      ceph_fsid: 1dff0e0f-3c44-48da-81cd-4f3c6e8722b2
      ceph_version: 21.0.0
      ceph_osd_devices:
        - /dev/ceph-{{ inventory_hostname_short }}-osd0/data
        - /dev/ceph-{{ inventory_hostname_short }}-osd1/data
        - /dev/ceph-{{ inventory_hostname_short }}-osd2/data
      ceph_conf_overrides:
        - section: global
          option: osd crush chooseleaf type
          value: 0
        - section: mon
          option: auth allow insecure global id reclaim
          value: false
        - section: mon
          option: mon data avail warn
          value: 10

- job:
    name: ansible-collection-ceph-molecule-aio-ubuntu-jammy
    parent: ansible-collection-ceph-molecule
    nodeset: ansible-collection-ceph-aio-ubuntu-jammy

- job:
    name: ansible-collection-ceph-molecule-aio-ubuntu-noble
    parent: ansible-collection-ceph-molecule
    nodeset: ansible-collection-ceph-aio-ubuntu-noble

- job:
    name: ansible-collection-ceph-molecule-ha-ubuntu-jammy
    parent: ansible-collection-ceph-molecule
    nodeset: ansible-collection-ceph-ha-ubuntu-jammy

- job:
    name: ansible-collection-ceph-molecule-ha-ubuntu-noble
    parent: ansible-collection-ceph-molecule
    nodeset: ansible-collection-ceph-ha-ubuntu-noble

- project:
    merge-mode: squash-merge
    check:
      jobs:
        - ansible-collection-ceph-molecule-aio-ubuntu-jammy
        - ansible-collection-ceph-molecule-aio-ubuntu-noble
        - ansible-collection-ceph-molecule-ha-ubuntu-jammy
        - ansible-collection-ceph-molecule-ha-ubuntu-noble
        - ansible-test
        - pre-commit
    gate:
      jobs:
        - ansible-collection-ceph-molecule-aio-ubuntu-jammy
        - ansible-collection-ceph-molecule-aio-ubuntu-noble
        - ansible-collection-ceph-molecule-ha-ubuntu-jammy
        - ansible-collection-ceph-molecule-ha-ubuntu-noble
        - ansible-test
        - pre-commit
