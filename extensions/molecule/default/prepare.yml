- name: Prepare
  hosts: all
  become: true
  tasks:
    # NOTE(mnaser): We need to stop depending on `inventory_hostname` and
    #               use the actual hostname of the system.
    - name: Workaround system hostname
      block:
        - name: Configure short hostname
          ansible.builtin.hostname:
            name: "{{ inventory_hostname_short }}"
        - name: Ensure hostname inside hosts file
          ansible.builtin.lineinfile:
            path: /etc/hosts
            regexp: '^127\.0\.1\.1'
            line: 127.0.1.1 {{ inventory_hostname }} {{ inventory_hostname_short }}

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] | lower == 'debian'

- name: Create fake devices
  ansible.builtin.import_playbook: vexxhost.ceph.create_fake_devices

- name: Re-run fake devices with loopback precheck disabled
  import_playbook: vexxhost.ceph.create_fake_devices
  vars:
    ceph_skip_loopback_check: true
