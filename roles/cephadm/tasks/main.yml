- name: Gather variables for each operating system
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_version'] | lower }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] | lower }}.yml"
    - "{{ ansible_facts['os_family'] | lower }}-{{ ansible_facts['distribution_major_version'] | lower }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}.yml"
    - "{{ ansible_facts['os_family'] | lower }}.yml"

# NOTE(ricolin): Ubuntu 26.04 ships uutils coreutils 0.7.0 as
# /usr/bin/install, which rejects the numeric UID/GID arguments that
# `cephadm bootstrap` passes (e.g. `install -o 167 -g 167 ...`) with
# "install: invalid user: '167'". Swap to coreutils-from-gnu so GNU
# install is used. The swap removes the essential coreutils-from-uutils
# package, which apt refuses by default, so we pass
# --allow-remove-essential explicitly.
- name: Ensure GNU coreutils is used on Ubuntu 26.04
  ansible.builtin.command:
    argv:
      - apt-get
      - install
      - --yes
      - --allow-remove-essential
      - coreutils-from-gnu
  register: _cephadm_gnu_coreutils
  changed_when: "'0 upgraded, 0 newly installed' not in _cephadm_gnu_coreutils.stdout"
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ansible_facts['distribution_version'] is version('26.04', '==')

- name: Install packages
  ansible.builtin.package:
    name: "{{ cephadm_packages }}"

- name: Ensure services are started
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
  loop: "{{ cephadm_services }}"

- name: Download "cephadm"
  ansible.builtin.get_url:
    url: "https://download.ceph.com/rpm-{{ cephadm_version }}/el9/noarch/cephadm"
    # NOTE(fitbeard): We use sudo and on RHEL default sudoers 'secure_path = /sbin:/bin:/usr/sbin:/usr/bin'
    dest: /usr/bin/cephadm
    mode: '0755'
    force: true

- name: Remove cephadm from old path
  ansible.builtin.file:
    path: /usr/local/bin/cephadm
    state: absent

- name: Ensure "cephadm" user is present
  ansible.builtin.user:
    name: cephadm
    shell: /bin/bash
    create_home: true

- name: Allow "cephadm" user to have passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/cephadm
    owner: root
    group: root
    mode: '0440'
    create: true
    line: "cephadm ALL=(ALL) NOPASSWD:ALL"
    validate: 'visudo -cf %s'
